<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LYNX AuthenChain</title>

<style>
:root {
  --bg1: #070b2b;
  --bg2: #0a123d;
  --glass: rgba(20, 30, 80, 0.55);
  --accent: linear-gradient(135deg, #6d7cff, #00ffe0);
}

* {
  box-sizing: border-box;
  font-family: "Segoe UI", system-ui, sans-serif;
}

body {
  margin: 0;
  height: 100vh;
  background: radial-gradient(circle at top, var(--bg2), var(--bg1));
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

/* ===== BACKGROUND GLOW ===== */
.bg-glow {
  position: absolute;
  width: 500px;
  height: 500px;
  background: radial-gradient(circle, #5b7cff55, transparent 70%);
  filter: blur(80px);
  animation: floatGlow 8s ease-in-out infinite;
}

@keyframes floatGlow {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-40px); }
}

/* ===== LOGIN CARD ===== */
.card {
  position: relative;
  width: 380px;
  padding: 32px;
  border-radius: 22px;
  background: var(--glass);
  backdrop-filter: blur(20px);
  box-shadow: 0 0 60px rgba(0,0,0,0.6);
  z-index: 2;
}

.card h1 {
  margin: 0;
  text-align: center;
  color: #7f8cff;
  font-size: 32px;
}

.card p {
  text-align: center;
  color: #bfc7ff;
  margin-bottom: 28px;
}

input {
  width: 100%;
  padding: 14px;
  margin-bottom: 16px;
  border-radius: 12px;
  border: none;
  outline: none;
  background: rgba(255,255,255,0.06);
  color: white;
}

button {
  width: 100%;
  padding: 14px;
  border-radius: 14px;
  border: none;
  cursor: pointer;
  font-size: 16px;
  background: var(--accent);
  color: #000;
  font-weight: 600;
}

/* ===== ANIME AI GIRL ===== */
.ai-girl {
  position: absolute;
  right: 8%;
  bottom: 12%;
  width: 240px;
  animation: floatGirl 5s ease-in-out infinite;
  z-index: 1;
}

@keyframes floatGirl {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-20px); }
}

/* ===== HEART KISS ===== */
.heart {
  position: absolute;
  right: 220px;
  bottom: 220px;
  font-size: 28px;
  opacity: 0;
  animation: kiss 4s infinite;
}

@keyframes kiss {
  0% {
    transform: scale(0.3);
    opacity: 0;
  }
  20% {
    opacity: 1;
  }
  60% {
    transform: translate(-60px, -60px) scale(1.4);
    opacity: 0;
  }
  100% {
    opacity: 0;
  }
}

/* ===== MOBILE ===== */
@media (max-width: 768px) {
  .ai-girl, .heart {
    display: none;
  }
}
</style>
</head>

<body>

<div class="bg-glow"></div>

<!-- LOGIN CARD -->
<div class="card">
  <h1>LYNX AuthenChain</h1>
  <p>Decentralized Identity & Blockchain Security</p>

  <input type="text" placeholder="Username" />
  <input type="password" placeholder="Password" />

  <button>Login</button>
</div>

<!-- ANIME AI GIRL -->
<img 
  src="https://raw.githubusercontent.com/AshirbadBiswal/assets/main/anime-ai-girl.png"
  alt="AI Girl"
  class="ai-girl"
/>

<!-- KISS HEART -->
<div class="heart">💙</div>

</body>
</html>
